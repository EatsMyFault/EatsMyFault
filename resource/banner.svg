<svg width="860" height="220" viewBox="0 0 860 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.52" stop-color="#0B2238"/>
      <stop offset="1" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="name" x1="84" y1="70" x2="538" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="0.45" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="line" x1="64" y1="160" x2="796" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" stroke="#8BD3FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="860" height="220" rx="18" fill="url(#bg)"/>
  <rect width="860" height="220" rx="18" fill="url(#grid)"/>

  <g opacity="0.45">
    <path d="M548 162 L622 92 L710 114 L796 52" stroke="#38BDF8" stroke-width="1.5"/>
    <path d="M548 162 L638 174 L710 114" stroke="#2DD4BF" stroke-width="1.5"/>
    <path d="M622 92 L638 174 L796 52" stroke="#60A5FA" stroke-width="1.5"/>
    <circle cx="548" cy="162" r="4" fill="#67E8F9"/>
    <circle cx="622" cy="92" r="4" fill="#67E8F9"/>
    <circle cx="638" cy="174" r="4" fill="#67E8F9"/>
    <circle cx="710" cy="114" r="4" fill="#67E8F9"/>
    <circle cx="796" cy="52" r="4" fill="#67E8F9"/>
  </g>

  <g filter="url(#glow)">
    <text x="64" y="78" fill="url(#name)" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">
      Jongsun Chung
    </text>
  </g>

  <text x="66" y="116" fill="#B7E7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1">
    Unreal Engine Digital Twin Developer
  </text>

  <line x1="64" y1="150" x2="796" y2="150" stroke="url(#line)" stroke-width="1.5"/>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
    <rect x="64" y="166" width="58" height="26" rx="13" fill="#0F2942" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="82" y="184" fill="#EAF6FF">C++</text>

    <rect x="128" y="166" width="116" height="26" rx="13" fill="#0F2942" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="147" y="184" fill="#EAF6FF">Unreal Engine</text>

    <rect x="250" y="166" width="100" height="26" rx="13" fill="#0F2942" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="269" y="184" fill="#EAF6FF">Digital Twin</text>

    <rect x="356" y="166" width="72" height="26" rx="13" fill="#0F2942" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="376" y="184" fill="#EAF6FF">Backend</text>
  </g>
